<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>QR Menu</title>
    <script type="text/javascript">
      // Redirect to index.html for SPA routing on GitHub Pages
      var pathSegmentsToKeep = 1;
      var l = window.location;
      var currentPath = l.pathname + l.search + l.hash;
      
      // Store the path for restoration
      sessionStorage.redirect = currentPath;
      
      // Redirect to index.html
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/QRMENU/index.html'
      );
    </script>
  </head>
  <body>
  </body>
</html>
